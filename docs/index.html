<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>身體意象研究文獻日報</title>
<style>
:root {
  --bg: #f6f1e8;
  --surface: #fffaf2;
  --line: #d8c5ab;
  --text: #2b2118;
  --muted: #766453;
  --accent: #8c4f2b;
  --accent-soft: #ead2bf;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans TC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #fff6ea 0, var(--bg) 55%, #ead8c6 100%);
  color: var(--text);
  line-height: 1.8;
  min-height: 100vh;
}
.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 60px 20px;
  text-align: center;
}
h1 {
  font-size: 2rem;
  color: var(--accent);
  margin-bottom: 8px;
}
.subtitle {
  color: var(--muted);
  font-size: 1.1rem;
  margin-bottom: 40px;
}
.message {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 2px 12px rgba(140,79,43,0.06);
}
.message p {
  color: var(--muted);
  font-size: 1rem;
}
.footer {
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
}
.footer a {
  display: inline-block;
  margin: 0 12px;
  color: var(--accent);
  text-decoration: none;
  font-size: 0.95rem;
}
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>身體意象研究文獻日報</h1>
  <p class="subtitle">Body Image Disorders Research Daily Report</p>
  <div class="message">
    <p>每日文獻日報將於 GMT+8 08:20 自動生成</p>
    <p style="margin-top:12px;">請稍候，第一份報告即將產出。</p>
  </div>
  <div class="footer">
    <a href="https://www.leepsyclinic.com/" target="_blank" rel="noopener">李政洋身心診所</a>
    <a href="https://blog.leepsyclinic.com/" target="_blank" rel="noopener">訂閱電子報</a>
    <a href="https://buymeacoffee.com/CYlee" target="_blank" rel="noopener">Buy me a coffee</a>
  </div>
</div>
</body>
</html>
